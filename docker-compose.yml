version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: geofence-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: geofence_app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geofence-network

  # Backend API (optional - for containerized development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geofence-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/geofence_app?sslmode=disable
      JWT_SECRET: dev-secret-key-change-in-production
      PORT: 8080
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - geofence-network
    profiles:
      - full # Only start with: docker-compose --profile full up

  # Redis (for future caching/session management)
  redis:
    image: redis:7-alpine
    container_name: geofence-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geofence-network
    profiles:
      - full

  # pgAdmin (optional - for database management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geofence-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@geofence.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - geofence-network
    profiles:
      - tools # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  geofence-network:
    driver: bridge
